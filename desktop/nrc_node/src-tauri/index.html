<!DOCTYPE html>
<html>
<head>
  <title>国储会节点</title>  <!-- 中文注释：网页标题，显示在浏览器标签（开发时可见） -->
  <meta charset="UTF-8">     <!-- 中文注释：设置字符编码为 UTF-8，支持中文 -->
</head>
<body>
  <h1>国储会节点前端软件</h1>  <!-- 中文注释：页面主标题 -->
  <button onclick="startNode()">启动节点</button>  <!-- 中文注释：启动按钮，点击调用 Rust 函数 -->
  <button onclick="checkStatus()">查看状态</button>  <!-- 中文注释：状态按钮，点击调用 Rust 函数 -->
  <p id="status">状态: 未启动</p>  <!-- 中文注释：状态显示区域，默认显示未启动 -->
  <script type="text/javascript">
    const { invoke } = window.__TAURI__.tauri;  // 中文注释：引入 Tauri 的 invoke 方法，用于调用 Rust 函数

    async function startNode() {  // 中文注释：启动节点的前端函数
      await invoke('start_node');  // 中文注释：调用 Rust 的 start_node 函数
      document.getElementById('status').innerText = '中文注释：国储会节点已启动';  // 中文注释：更新状态显示
    }

    async function checkStatus() {  // 中文注释：查看状态的前端函数
      const count = await invoke('get_status');  // 中文注释：调用 Rust 的 get_status 函数，返回区块数量
      document.getElementById('status').innerText = `中文注释：区块数量: ${count}`;  // 中文注释：显示区块数量
    }
  </script>
</body>
</html>
