[workspace]  # 中文注释：定义 Cargo 工作空间，用于管理多个子 crate
members = [  # 中文注释：列出工作空间包含的子 crate（成员）
    "init",          # 中文注释：初始化工具的子 crate
    "send_tx",       # 中文注释：发送交易工具的子 crate
    "check_blocks",  # 中文注释：检查区块工具的子 crate
]

[dependencies]  # 中文注释：定义工作空间的依赖项，所有子 crate 可以共享这些依赖
core = { path = "../core" }              # 中文注释：依赖核心层，路径指向项目根目录下的 core 目录
security = { path = "../security" }      # 中文注释：依赖安全层，路径指向项目根目录下的 security 目录
storage = { path = "../storage" }        # 中文注释：依赖存储层，路径指向项目根目录下的 storage 目录
network = { path = "../network" }        # 中文注释：依赖网络层，路径指向项目根目录下的 network 目录
interface = { path = "../interface" }    # 中文注释：依赖接口层，路径指向项目根目录下的 interface 目录
extension = { path = "../extension" }    # 中文注释：依赖扩展层，路径指向项目根目录下的 extension 目录