[package]
name = "core"  # 中文注释：核心层 crate 名称
version = "0.1.0"
edition = "2021"

[workspace]
members = [
    ".",  # 中文注释：表示当前目录为核心层唯一的 crate
]

[dependencies]
security = { path = "../security" }  # 中文注释：依赖安全层
storage = { path = "../storage" }    # 中文注释：依赖存储层
network = { path = "../network" }    # 中文注释：依赖网络层