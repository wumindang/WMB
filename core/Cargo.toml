# 文件路径: WMB/core/Cargo.toml

[package]
name = "wmb-core"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
sha2 = "0.10"
secp256k1 = "0.24"
rand = "0.8"
libp2p = { version = "0.51", features = ["tcp", "async-std", "noise", "yamux", "floodsub", "mdns"] }
bincode = "1.3"
futures = "0.3"
evm = "0.39"
primitive-types = "0.12"
sha3 = "0.10"
hex = "0.4"  # 新增 HEX 编码支持

[lib]
crate-type = ["cdylib"]  # 生成动态库以供 FFI 使用